name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Release workflow only. Ship the two primary assets we can explain and
  # defend, instead of publishing every compile target as a release promise.

  build-linux-release:
    name: Build n0s-ryo-miner-linux
    runs-on: ubuntu-24.04
    container:
      image: docker.io/nvidia/cuda:12.8.0-devel-ubuntu24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            cmake g++ \
            libmicrohttpd-dev libssl-dev \
            ocl-icd-opencl-dev opencl-headers \
            gzip xxd

      - name: Generate embedded GUI assets
        run: bash scripts/embed_assets.sh gui n0s/http/embedded_assets.hpp

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCUDA_ENABLE=ON \
            -DOpenCL_ENABLE=ON \
            -DMICROHTTPD_ENABLE=ON \
            -DHWLOC_ENABLE=OFF \
            -DCUDA_ARCH="61;75;80;86;89;90;100;120" \
            -DCMAKE_BUILD_TYPE=Release \
            -DN0S_COMPILE=generic \
            -DCMAKE_LINK_STATIC=ON
          cmake --build . -j$(nproc)

      - name: Stage release asset
        run: |
          mkdir -p release
          install -m 0755 build/bin/n0s-ryo-miner release/n0s-ryo-miner-linux

      - name: Verify release asset
        run: |
          test -x release/n0s-ryo-miner-linux
          ls -lh release/n0s-ryo-miner-linux
          release/n0s-ryo-miner-linux --version 2>&1 || echo "Note: --version failed (expected in driverless container)"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/n0s-ryo-miner-linux

  build-windows-release:
    name: Build n0s-ryo-miner-win.exe
    runs-on: windows-2022
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: 'local'

      - name: Verify CUDA
        run: nvcc -V

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '52f5569a8e867859fac967c1e3f10ca0a8a3cc39'
          runVcpkgInstall: true

      - name: Generate embedded GUI assets
        shell: bash
        run: |
          if command -v xxd &>/dev/null; then
            bash scripts/embed_assets.sh gui n0s/http/embedded_assets.hpp
          else
            echo "xxd not found, using committed embedded_assets.hpp"
          fi

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${env:VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCUDA_ENABLE=ON `
            -DOpenCL_ENABLE=ON `
            -DMICROHTTPD_ENABLE=OFF `
            -DHWLOC_ENABLE=OFF `
            -DCUDA_ARCH="61;75;80;86;89" `
            -DCMAKE_BUILD_TYPE=Release `
            -DN0S_COMPILE=generic `
            -DCMAKE_LINK_STATIC=ON

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Stage release asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $binary = Get-ChildItem -Path build -Recurse -Filter "n0s-ryo-miner.exe" | Select-Object -First 1
          if (-not $binary) {
            throw "n0s-ryo-miner.exe not found"
          }
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item $binary.FullName release/n0s-ryo-miner-win.exe
          Write-Host "Staged: release/n0s-ryo-miner-win.exe"

      - name: Verify release asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $binary = Resolve-Path release/n0s-ryo-miner-win.exe
          $item = Get-Item $binary
          Write-Host "Binary: $($item.FullName)"
          Write-Host "Size: $([math]::Round($item.Length / 1MB, 1)) MB"
          & $item.FullName --version 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Note: --version exited $LASTEXITCODE (expected on a headless runner without GPU driver state)"
          }
          exit 0

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: release/n0s-ryo-miner-win.exe

  release:
    name: Create Release
    needs: [build-linux-release, build-windows-release]
    runs-on: ubuntu-24.04
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/release-linux/n0s-ryo-miner-linux release/
          cp artifacts/release-win/n0s-ryo-miner-win.exe release/
          cd release
          sha256sum n0s-ryo-miner-linux n0s-ryo-miner-win.exe > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/n0s-ryo-miner-linux
            release/n0s-ryo-miner-win.exe
            release/SHA256SUMS
