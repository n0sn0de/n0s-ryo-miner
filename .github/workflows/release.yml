name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Release workflow only. Ship the assets we can honestly explain and defend.

  build-linux-opencl-release:
    name: Build linux-opencl
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake g++ \
            libmicrohttpd-dev libssl-dev \
            ocl-icd-opencl-dev opencl-headers \
            tar gzip zip xxd

      - name: Generate embedded GUI assets
        run: bash scripts/embed_assets.sh gui n0s/http/embedded_assets.hpp

      - name: Build
        run: |
          cmake -S . -B build-linux-opencl \
            -DCUDA_ENABLE=OFF \
            -DOpenCL_ENABLE=ON \
            -DMICROHTTPD_ENABLE=ON \
            -DHWLOC_ENABLE=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DN0S_COMPILE=generic \
            -DCMAKE_LINK_STATIC=ON
          cmake --build build-linux-opencl -j$(nproc)

      - name: Package release asset
        run: |
          mkdir -p release/linux-opencl
          install -m 0755 build-linux-opencl/bin/n0s-ryo-miner release/linux-opencl/n0s-ryo-miner
          tar -C release/linux-opencl -czf release/n0s-ryo-miner-linux-opencl.tar.gz n0s-ryo-miner
          test -s release/n0s-ryo-miner-linux-opencl.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-opencl-release
          path: release/n0s-ryo-miner-linux-opencl.tar.gz
          if-no-files-found: error

  build-linux-cuda12-opencl-release:
    name: Build linux-cuda12-opencl
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    container:
      image: docker.io/nvidia/cuda:12.8.0-devel-ubuntu24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            cmake g++ \
            libmicrohttpd-dev libssl-dev \
            ocl-icd-opencl-dev opencl-headers \
            tar gzip zip xxd

      - name: Generate embedded GUI assets
        run: bash scripts/embed_assets.sh gui n0s/http/embedded_assets.hpp

      - name: Build
        run: |
          cmake -S . -B build-linux-cuda12-opencl \
            -DCUDA_ENABLE=ON \
            -DOpenCL_ENABLE=ON \
            -DMICROHTTPD_ENABLE=ON \
            -DHWLOC_ENABLE=OFF \
            -DCUDA_ARCH="61;75;80;86;89;90;100;120" \
            -DCMAKE_BUILD_TYPE=Release \
            -DN0S_COMPILE=generic \
            -DCMAKE_LINK_STATIC=ON
          cmake --build build-linux-cuda12-opencl -j$(nproc)

      - name: Package release asset
        run: |
          mkdir -p release/linux-cuda12-opencl
          install -m 0755 build-linux-cuda12-opencl/bin/n0s-ryo-miner release/linux-cuda12-opencl/n0s-ryo-miner
          tar -C release/linux-cuda12-opencl -czf release/n0s-ryo-miner-linux-cuda12-opencl.tar.gz n0s-ryo-miner
          test -s release/n0s-ryo-miner-linux-cuda12-opencl.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-cuda12-opencl-release
          path: release/n0s-ryo-miner-linux-cuda12-opencl.tar.gz
          if-no-files-found: error

  build-windows-opencl-cross-release:
    name: Build windows-opencl-cross
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mingw-w64 cmake g++ pkg-config \
            curl perl make file \
            zip xxd

      - name: Generate embedded GUI assets
        run: bash scripts/embed_assets.sh gui n0s/http/embedded_assets.hpp

      - name: Build
        run: ./scripts/cross-build-windows.sh

      - name: Package release asset
        run: |
          mkdir -p release/windows-opencl-cross
          install -m 0755 dist/windows-opencl/n0s-ryo-miner.exe release/windows-opencl-cross/n0s-ryo-miner.exe
          cd release/windows-opencl-cross
          zip -9 ../n0s-ryo-miner-windows-opencl-cross.zip n0s-ryo-miner.exe
          cd ../..
          test -s release/n0s-ryo-miner-windows-opencl-cross.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-opencl-cross-release
          path: release/n0s-ryo-miner-windows-opencl-cross.zip
          if-no-files-found: error

  build-windows-cuda12-opencl-release:
    name: Build windows-cuda12-opencl
    runs-on: windows-2022
    timeout-minutes: 75
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: 'local'

      - name: Verify CUDA
        run: nvcc -V

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '52f5569a8e867859fac967c1e3f10ca0a8a3cc39'
          runVcpkgInstall: true

      - name: Generate embedded GUI assets
        shell: bash
        run: |
          if command -v xxd &>/dev/null; then
            bash scripts/embed_assets.sh gui n0s/http/embedded_assets.hpp
          else
            echo "xxd not found, using committed embedded_assets.hpp"
          fi

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${env:VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCUDA_ENABLE=ON `
            -DOpenCL_ENABLE=ON `
            -DMICROHTTPD_ENABLE=OFF `
            -DHWLOC_ENABLE=OFF `
            -DCUDA_ARCH="61;75;80;86;89" `
            -DCMAKE_BUILD_TYPE=Release `
            -DN0S_COMPILE=generic `
            -DCMAKE_LINK_STATIC=ON

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package release asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $binary = Get-ChildItem -Path build/bin/Release -Filter "n0s-ryo-miner.exe" -File | Select-Object -First 1
          if (-not $binary) {
            throw "Expected build/bin/Release/n0s-ryo-miner.exe"
          }
          New-Item -ItemType Directory -Force -Path release/windows-cuda12-opencl | Out-Null
          Copy-Item $binary.FullName release/windows-cuda12-opencl/n0s-ryo-miner.exe
          Compress-Archive -Path release/windows-cuda12-opencl/n0s-ryo-miner.exe -DestinationPath release/n0s-ryo-miner-windows-cuda12-opencl.zip -Force
          if (-not (Test-Path release/n0s-ryo-miner-windows-cuda12-opencl.zip)) {
            throw "Failed to create release/n0s-ryo-miner-windows-cuda12-opencl.zip"
          }

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-cuda12-opencl-release
          path: release/n0s-ryo-miner-windows-cuda12-opencl.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build-linux-opencl-release
      - build-linux-cuda12-opencl-release
      - build-windows-opencl-cross-release
      - build-windows-cuda12-opencl-release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/linux-opencl-release/n0s-ryo-miner-linux-opencl.tar.gz release/
          cp artifacts/linux-cuda12-opencl-release/n0s-ryo-miner-linux-cuda12-opencl.tar.gz release/
          cp artifacts/windows-opencl-cross-release/n0s-ryo-miner-windows-opencl-cross.zip release/
          cp artifacts/windows-cuda12-opencl-release/n0s-ryo-miner-windows-cuda12-opencl.zip release/
          cd release
          sha256sum \
            n0s-ryo-miner-linux-opencl.tar.gz \
            n0s-ryo-miner-linux-cuda12-opencl.tar.gz \
            n0s-ryo-miner-windows-opencl-cross.zip \
            n0s-ryo-miner-windows-cuda12-opencl.zip \
            > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/n0s-ryo-miner-linux-opencl.tar.gz
            release/n0s-ryo-miner-linux-cuda12-opencl.tar.gz
            release/n0s-ryo-miner-windows-opencl-cross.zip
            release/n0s-ryo-miner-windows-cuda12-opencl.zip
            release/SHA256SUMS
